name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Run test suite
        run: make test

  sanitizers:
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sanitizer suite
        run: make test-sanitize
