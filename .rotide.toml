# Rotide example project config.
# Current configurable section: [keymap]
# Key spec format:
# - "ctrl+<a-z>", "alt+<a-z>", "ctrl+alt+<a-z>"
# - "ctrl+left/right/up/down", "alt+left/right/up/down",
#   "ctrl+alt+left/right/up/down"
# - Modifiers are case-insensitive and can be in any order
# - or one of
# left/right/up/down/home/end/page_up/page_down/enter/esc/backspace/del

[keymap]
quit = "ctrl+q"
save = "ctrl+s"
new_tab = "ctrl+n"
close_tab = "ctrl+w"
next_tab = "alt+right"
prev_tab = "alt+left"
focus_drawer = "ctrl+e"
find = "ctrl+f"
goto_line = "ctrl+g"
toggle_selection = "ctrl+b"
copy_selection = "ctrl+c"
cut_selection = "ctrl+x"
delete_selection = "ctrl+d"
paste = "ctrl+v"
undo = "ctrl+z"
redo = "ctrl+y"
move_home = "home"
move_end = "end"
page_up = "page_up"
page_down = "page_down"
move_up = "up"
move_down = "down"
move_left = "left"
move_right = "right"
newline = "enter"
escape = "esc"
redraw = "ctrl+l"
delete_char = "del"
backspace = "backspace"
