# Rotide example project config.
# Configurable sections: [editor], [theme.syntax], [lsp], [keymap]
# Editor:
# - cursor_style = "block" | "bar" | "underline" (case-insensitive)
# - Invalid cursor_style values fall back to "bar" with a warning
# Theme:
# - [theme.syntax] supports semantic classes:
#   comment|keyword|type|function|string|number|constant|preprocessor|operator|punctuation
# - values are ANSI 16-color names:
#   default|black|red|green|yellow|blue|magenta|cyan|white|
#   bright_black|bright_red|bright_green|bright_yellow|bright_blue|bright_magenta|bright_cyan|bright_white
# - aliases: gray/grey => bright_black
# - Invalid [theme.syntax] entries are ignored with a warning; defaults remain in effect.
# LSP:
# - [lsp]
# - gopls_enabled = true|false
# - clangd_enabled = true|false
# - html_enabled = true|false
# - css_enabled = true|false
# - json_enabled = true|false
# - eslint_enabled = true|false
# - gopls_command = "gopls" (command/path used to start gopls)
# - clangd_command = "clangd" (command/path used to start clangd)
# - html_command/css_command/json_command/eslint_command can be set per project
# - enabled = true|false is still accepted as a legacy alias for all built-in LSP servers
# - gopls_install_command and vscode_langservers_install_command are global-only
# - eslint_fix is an opt-in keymap action with no default binding
# - Invalid [lsp] values fall back to defaults with a warning.
# Key spec format:
# - "ctrl+<a-z>", "alt+<a-z>", "ctrl+alt+<a-z>", "ctrl+]"
# - "ctrl+left/right/up/down", "alt+left/right/up/down",
#   "ctrl+alt+left/right/up/down"
# - "alt+shift+left/right/up/down"
# - Modifiers are case-insensitive and can be in any order
# - or one of
# left/right/up/down/home/end/page_up/page_down/enter/esc/backspace/del
# - Rotide binds terminal key codes, so some physical keys alias the same input
# - "ctrl+i" is unsafe because terminals send the same byte for Ctrl-I and Tab
# - "ctrl+m" and "ctrl+[" alias Enter and Esc; use them only for newline/escape
# - "ctrl+h" aliases backspace and should only be used for the backspace action
# - Tab stays reserved for literal text insertion under the baseline terminal model
# - Default goto_definition is "ctrl+o"; avoid "ctrl+i" because it aliases Tab
# - In drawer focus, enter toggles directories and opens files in tabs
#   (reusing an already-open file tab when possible)

[editor]
cursor_style = "bar"

[theme.syntax]
comment = "gray"
keyword = "bright_cyan"
type = "bright_blue"
function = "bright_yellow"
string = "green"
number = "bright_magenta"
constant = "cyan"
preprocessor = "bright_red"
operator = "white"
punctuation = "bright_black"

[lsp]
gopls_enabled = true
clangd_enabled = true
html_enabled = true
css_enabled = true
json_enabled = true
eslint_enabled = true
gopls_command = "gopls"
clangd_command = "clangd"
html_command = "~/.local/bin/vscode-html-language-server --stdio"
css_command = "~/.local/bin/vscode-css-language-server --stdio"
json_command = "~/.local/bin/vscode-json-language-server --stdio"
eslint_command = "~/.local/bin/vscode-eslint-language-server --stdio"

[keymap]
quit = "ctrl+q"
save = "ctrl+s"
new_tab = "ctrl+n"
close_tab = "ctrl+w"
next_tab = "alt+right"
prev_tab = "alt+left"
focus_drawer = "ctrl+e"
resize_drawer_narrow = "alt+shift+left"
resize_drawer_widen = "alt+shift+right"
find = "ctrl+f"
goto_line = "ctrl+g"
goto_definition = "ctrl+o"
# eslint_fix = "ctrl+alt+e"
toggle_selection = "ctrl+b"
copy_selection = "ctrl+c"
cut_selection = "ctrl+x"
delete_selection = "ctrl+d"
paste = "ctrl+v"
undo = "ctrl+z"
redo = "ctrl+y"
move_home = "home"
move_end = "end"
page_up = "page_up"
page_down = "page_down"
scroll_left = "ctrl+left"
scroll_right = "ctrl+right"
move_up = "up"
move_down = "down"
move_left = "left"
move_right = "right"
newline = "enter"
escape = "esc"
redraw = "ctrl+l"
delete_char = "del"
backspace = "backspace"
